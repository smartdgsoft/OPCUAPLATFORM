version: "3.9"

networks:
  opcua-net:
    driver: bridge

volumes:
  timescale-data:
  redis-data:
  grafana-data:

services:

  # ─────────────────────────────────────────────
  # TimescaleDB (PostgreSQL + time-series extension)
  # ─────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: opcua-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opcua}
      POSTGRES_USER: ${POSTGRES_USER:-opcua_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_pass}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - opcua-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opcua_admin} -d ${POSTGRES_DB:-opcua}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — hot tag cache + alarm pub/sub
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opcua-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - opcua-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # OPC UA Client (Python asyncua)
  # ─────────────────────────────────────────────
  opcua-client:
    build:
      context: ./opcua-client
      dockerfile: Dockerfile
    container_name: opcua-client
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-opcua_admin}:${POSTGRES_PASSWORD:-changeme_strong_pass}@timescaledb:5432/${POSTGRES_DB:-opcua}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - OPC_SERVER_URL=${OPC_SERVER_URL:-opc.tcp://localhost:4840}
      - OPC_SERVER_NAME=${OPC_SERVER_NAME:-Default Server}
      - OPC_SECURITY_MODE=${OPC_SECURITY_MODE:-None}
      - OPC_SECURITY_POLICY=${OPC_SECURITY_POLICY:-None}
      - OPC_USERNAME=${OPC_USERNAME:-}
      - OPC_PASSWORD=${OPC_PASSWORD:-}
      - OPC_CERTIFICATE_PATH=${OPC_CERTIFICATE_PATH:-/app/certs/client_cert.pem}
      - OPC_PRIVATE_KEY_PATH=${OPC_PRIVATE_KEY_PATH:-/app/certs/client_key.pem}
      - PUBLISH_INTERVAL_MS=${PUBLISH_INTERVAL_MS:-1000}
      - BUFFER_FLUSH_INTERVAL_S=${BUFFER_FLUSH_INTERVAL_S:-5}
      - BATCH_INSERT_SIZE=${BATCH_INSERT_SIZE:-500}
      # ── Feature flags ──
      - FEATURE_WRITE=${FEATURE_WRITE:-true}
      - FEATURE_METHODS=${FEATURE_METHODS:-true}
      - FEATURE_MULTI_SERVER=${FEATURE_MULTI_SERVER:-false}
      - FEATURE_ALARM_EVAL=${FEATURE_ALARM_EVAL:-true}
      - FEATURE_SCHEDULER=${FEATURE_SCHEDULER:-false}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-opcua.tag.values}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./opcua-client/config:/app/config
      - ./opcua-client/certs:/app/certs
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: opcua-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-opcua_admin}:${POSTGRES_PASSWORD:-changeme_strong_pass}@timescaledb:5432/${POSTGRES_DB:-opcua}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change_this_jwt_secret_256bit}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}
      - OPC_SERVER_URL=${OPC_SERVER_URL:-opc.tcp://localhost:4840}
      - OPC_SECURITY_MODE=${OPC_SECURITY_MODE:-None}
      - OPC_SECURITY_POLICY=${OPC_SECURITY_POLICY:-None}
      - FEATURE_WRITE=${FEATURE_WRITE:-true}
      - FEATURE_METHODS=${FEATURE_METHODS:-true}
      - FEATURE_MULTI_SERVER=${FEATURE_MULTI_SERVER:-false}
      - FEATURE_ALARM_EVAL=${FEATURE_ALARM_EVAL:-true}
      - FEATURE_SCHEDULER=${FEATURE_SCHEDULER:-false}
      - FEATURE_DIGITAL_TWIN=${FEATURE_DIGITAL_TWIN:-false}
      - FEATURE_TWIN_PREDICTIVE=${FEATURE_TWIN_PREDICTIVE:-false}
      - FEATURE_CLOSED_LOOP_ADVISORY=${FEATURE_CLOSED_LOOP_ADVISORY:-false}
      - FEATURE_CONNECTOR_HUB=${FEATURE_CONNECTOR_HUB:-false}
      - FEATURE_PROBLEM_TEMPLATES=${FEATURE_PROBLEM_TEMPLATES:-false}
      - FEATURE_DASHBOARDS=${FEATURE_DASHBOARDS:-false}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # React Frontend (production build via nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000}
    container_name: opcua-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - opcua-net
    depends_on:
      - api

  # ─────────────────────────────────────────────
  # Twin Evaluator — Digital Twin status tier (on-demand)
  # Only runs when FEATURE_DIGITAL_TWIN=true.
  # ─────────────────────────────────────────────
  twin-evaluator:
    build:
      context: ./twin-evaluator
      dockerfile: Dockerfile
    container_name: opcua-twin-evaluator
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-opcua_admin}:${POSTGRES_PASSWORD:-changeme_strong_pass}@timescaledb:5432/${POSTGRES_DB:-opcua}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - TWIN_EVAL_INTERVAL_S=${TWIN_EVAL_INTERVAL_S:-5}
      - TWIN_LEARN_REFRESH_S=${TWIN_LEARN_REFRESH_S:-3600}
      - TWIN_STALE_AFTER_S=${TWIN_STALE_AFTER_S:-30}
      - TWIN_METRICS_PORT=9092
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # Twin Predictive — enterprise predictive module (on-demand)
  # Only runs when FEATURE_TWIN_PREDICTIVE=true. Owns ML deps.
  # ─────────────────────────────────────────────
  twin-predictive:
    build:
      context: ./twin-predictive
      dockerfile: Dockerfile
    container_name: opcua-twin-predictive
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-opcua_admin}:${POSTGRES_PASSWORD:-changeme_strong_pass}@timescaledb:5432/${POSTGRES_DB:-opcua}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - PRED_SCORE_INTERVAL_S=${PRED_SCORE_INTERVAL_S:-30}
      - PRED_RETRAIN_CHECK_S=${PRED_RETRAIN_CHECK_S:-3600}
      - FEATURE_CLOSED_LOOP_ADVISORY=${FEATURE_CLOSED_LOOP_ADVISORY:-false}
      - FEATURE_PROBLEM_TEMPLATES=${FEATURE_PROBLEM_TEMPLATES:-false}
      - PRED_METRICS_PORT=9093
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # Connector Hub — unified connectivity (on-demand)
  # Runs non-OPC-UA sources (SQL, MQTT, ...). FEATURE_CONNECTOR_HUB=true.
  # ─────────────────────────────────────────────
  connector-hub:
    build:
      context: ./connector-hub
      dockerfile: Dockerfile
    container_name: opcua-connector-hub
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-opcua_admin}:${POSTGRES_PASSWORD:-changeme_strong_pass}@timescaledb:5432/${POSTGRES_DB:-opcua}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - HUB_POLL_TICK_S=${HUB_POLL_TICK_S:-2}
      - HUB_METRICS_PORT=9094
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # Grafana — ops dashboards
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: opcua-grafana
    restart: unless-stopped
    depends_on:
      - timescaledb
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_pass}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-worldmap-panel
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=timescaledb:5432
      - GF_DATABASE_NAME=${POSTGRES_DB:-opcua}
      - GF_DATABASE_USER=${POSTGRES_USER:-opcua_admin}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-changeme_strong_pass}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    networks:
      - opcua-net

  # ─────────────────────────────────────────────
  # Nginx reverse proxy (optional unified entrypoint)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: opcua-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - opcua-net
