global
    log stdout format raw local0
    maxconn 50000
    nbthread 4
    cpu-map auto:1/1-4 0-3

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect  5s
    timeout client  60s
    timeout server  60s
    timeout tunnel 3600s          # WebSocket tunnel keep-alive
    retries 3
    option  redispatch

# ── Stats page ──────────────────────────────────────────────────────────────
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    stats auth admin:haproxy_stats_pass

# ── API backend ──────────────────────────────────────────────────────────────
frontend api-frontend
    bind *:8000
    default_backend api-backend

    # WebSocket detection — route to ws-backend
    acl is_websocket hdr(Upgrade) -i WebSocket
    use_backend ws-backend if is_websocket

    # Health check passthrough
    acl is_health path /api/health
    use_backend api-backend if is_health

backend api-backend
    balance leastconn
    option  httpchk GET /api/health
    http-check expect status 200

    server api-1 opcua-api-1:8000 check inter 5s fall 3 rise 2 weight 100
    server api-2 opcua-api-2:8000 check inter 5s fall 3 rise 2 weight 100

backend ws-backend
    balance source                # sticky by client IP for WebSocket sessions
    timeout tunnel 3600s

    server api-ws-1 opcua-api-1:8000 check inter 5s
    server api-ws-2 opcua-api-2:8000 check inter 5s
