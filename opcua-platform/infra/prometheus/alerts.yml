groups:
  - name: opcua_platform
    rules:

    # ── OPC UA Client ──────────────────────────────────────────────
    - alert: OpcUAClientDisconnected
      expr: opcua_connection_status == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "OPC UA client disconnected"
        description: "The OPC UA client has been disconnected for more than 30 seconds."

    - alert: OpcUAHighQueueDepth
      expr: opcua_queue_depth > 10000
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "OPC UA ingest queue depth high"
        description: "Queue depth {{ $value }} — consumer may be falling behind."

    - alert: OpcUAWriteErrors
      expr: rate(opcua_write_errors_total[5m]) > 0.1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "OPC UA write errors detected"
        description: "Write error rate {{ $value | humanize }} errors/sec"

    - alert: OpcUAOfflineBufferGrowing
      expr: increase(opcua_rows_buffered_total[5m]) > 1000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "OPC UA offline buffer is growing"
        description: "{{ $value }} rows buffered to SQLite — DB may be unreachable."

    # ── Kafka ──────────────────────────────────────────────────────
    - alert: KafkaConsumerLagHigh
      expr: kafka_consumergroup_lag > 50000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Kafka consumer lag is high"
        description: "Consumer group lag is {{ $value }} messages."

    - alert: KafkaBrokerDown
      expr: up{job="kafka"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Kafka broker is down"

    # ── TimescaleDB ────────────────────────────────────────────────
    - alert: PostgresDown
      expr: up{job="timescaledb"} == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "TimescaleDB is down"

    - alert: PostgresHighConnections
      expr: pg_stat_activity_count > 180
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "TimescaleDB connection count high ({{ $value }}/200)"

    - alert: PostgresReplicationLag
      expr: pg_replication_lag > 30
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "TimescaleDB replica lagging {{ $value }}s behind primary"

    - alert: PostgresDiskSpaceHigh
      expr: (pg_database_size_bytes / (1024*1024*1024)) > 400
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "TimescaleDB database size > 400GB"

    # ── Redis ──────────────────────────────────────────────────────
    - alert: RedisDown
      expr: up{job="redis"} == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Redis is down"

    - alert: RedisMemoryHigh
      expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Redis memory usage above 85%"

    # ── API ────────────────────────────────────────────────────────
    - alert: APIHighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "API p95 latency > 2s"

    - alert: APIHighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "API error rate > 5%"

    # ── Host ───────────────────────────────────────────────────────
    - alert: HighCPU
      expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Host CPU > 85% for 5 minutes"

    - alert: HighMemory
      expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Host memory > 90%"

    - alert: DiskSpaceLow
      expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Disk space < 15% remaining"
