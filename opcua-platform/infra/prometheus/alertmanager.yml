global:
  smtp_smarthost: "${SMTP_HOST:-localhost:587}"
  smtp_from:       "${SMTP_FROM:-alerts@opcua.local}"
  smtp_auth_username: "${SMTP_USER:-}"
  smtp_auth_password: "${SMTP_PASS:-}"
  smtp_require_tls: false

route:
  group_by: ["alertname", "severity"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      repeat_interval: 30m

    - match:
        severity: warning
      receiver: warning-alerts

receivers:
  - name: default
    email_configs:
      - to: "${ALERT_EMAIL:-admin@opcua.local}"
        send_resolved: true

  - name: critical-alerts
    email_configs:
      - to: "${ALERT_EMAIL:-admin@opcua.local}"
        subject: "[CRITICAL] OPC UA Platform: {{ .GroupLabels.alertname }}"
        send_resolved: true
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #     send_resolved: true

  - name: warning-alerts
    email_configs:
      - to: "${ALERT_EMAIL:-admin@opcua.local}"
        subject: "[WARNING] OPC UA Platform: {{ .GroupLabels.alertname }}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
